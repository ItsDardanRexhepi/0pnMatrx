# 0pnMatrx secrets — example manifest, DO NOT commit a real version.
#
# In production, manage these through SealedSecrets, SOPS, or your cloud
# provider's secret store (AWS Secrets Manager, GCP Secret Manager,
# Azure Key Vault) rather than a plain Secret resource. This file is
# only a template showing which keys the gateway expects.
#
# Apply with:
#   kubectl -n opnmatrx create secret generic opnmatrx-secrets \
#       --from-literal=OPENMATRIX_PAYMASTER_KEY=... \
#       --from-literal=OPENMATRIX_API_KEY=... \
#       --from-literal=ANTHROPIC_API_KEY=... \
#       ...
#
# The ``enforce_env_only_secrets`` loader in runtime/config/validation.py
# will refuse to start the gateway in production mode unless the
# REQUIRED fields are present (paymaster key). Other provider keys are
# optional; set them only for providers you actually use.

apiVersion: v1
kind: Secret
metadata:
  name: opnmatrx-secrets
  namespace: opnmatrx
type: Opaque
stringData:
  # REQUIRED in production mode.
  OPENMATRIX_PAYMASTER_KEY: "REPLACE_WITH_REAL_PAYMASTER_KEY"

  # Optional — enable whichever providers you actually use.
  ANTHROPIC_API_KEY: "REPLACE_WITH_REAL_ANTHROPIC_KEY"
  OPENAI_API_KEY: ""
  NVIDIA_API_KEY: ""
  GOOGLE_API_KEY: ""

  # Gateway authentication (recommended).
  OPENMATRIX_API_KEY: "REPLACE_WITH_REAL_API_KEY"

  # Optional — Sentry error reporting.
  SENTRY_DSN: ""

  # Optional — blockchain RPC override.
  BASE_RPC_URL: ""

  # Optional — Telegram notifications.
  TELEGRAM_BOT_TOKEN: ""
