apiVersion: v1
kind: Service
metadata:
  name: opnmatrx-gateway
  namespace: opnmatrx
  labels:
    app.kubernetes.io/name: opnmatrx-gateway
    app.kubernetes.io/component: gateway
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: opnmatrx-gateway
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
