openapi: 3.1.0
info:
  title: 0pnMatrx Gateway API
  summary: Unified REST + SSE surface for the MTRX iOS app and third-party integrators.
  description: |
    This document describes every route exposed by the 0pnMatrx gateway
    process. The gateway is a single aiohttp server that mounts three
    families of endpoints:

      * `/health`, `/auth/*`, `/metrics*` — cross-cutting plumbing.
      * `/api/v1/*` — the thirty blockchain services the MTRX iOS
        Packager (`MTRXPackager`) targets directly, plus two
        cross-cutting endpoints (`/api/v1/batch` and
        `/api/v1/events/stream`).
      * `/bridge/v1/*` — the mobile bridge envelope used by the iOS
        app for session bring-up, chat, wallet linking and dashboard.

    The gateway is designed to answer every call the iOS `MTRXAPIClient`
    and `MTRXPackager` can make. Schemas here are the source of truth for
    field names and types; the Swift client mirrors them with
    `encodeSnakeCase` / `decodeSnakeCase` strategies.
  version: "1.0.0"
  contact:
    name: 0pnMatrx engineering
    url: https://openmatrix.io
  license:
    name: Proprietary

servers:
  - url: http://localhost:8000
    description: Local development
  - url: https://api.openmatrix.io
    description: Production gateway

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------

security:
  - bearerApiKey: []

components:
  securitySchemes:
    bearerApiKey:
      type: http
      scheme: bearer
      description: |
        Static API key set at gateway boot via `gateway.api_key` in
        `openmatrix.config.json` or `MTRX_API_KEY` environment override.
        Sent as `Authorization: Bearer <key>`. The `/health`,
        `/auth/nonce` and `/auth/verify` endpoints are public.

  # -------------------------------------------------------------------
  # Reusable envelopes
  # -------------------------------------------------------------------
  schemas:
    ServiceEnvelope:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, error]
        data:
          description: Arbitrary per-service result; shape documented per endpoint.
          nullable: true
        error:
          type: string
          nullable: true

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        scope:
          type: string
          description: Populated for capacity errors (`global` or `per_ip`).

    BatchItem:
      type: object
      required: [method, path]
      properties:
        id:
          type: string
          description: Client-generated correlation id, echoed back on the response.
        method:
          type: string
          enum: [GET, POST, DELETE]
        path:
          type: string
          example: /api/v1/contracts/convert
        body:
          description: Inline JSON body for this sub-request.
          nullable: true

    BatchRequest:
      type: object
      required: [requests]
      properties:
        requests:
          type: array
          items:
            $ref: "#/components/schemas/BatchItem"
          minItems: 0
          maxItems: 25
        sequential:
          type: boolean
          default: false
          description: Run items one after another instead of in parallel.
        abort_on_failure:
          type: boolean
          default: false
          description: In sequential mode, stop at the first non-2xx and mark the
            rest as aborted. In parallel mode this is a no-op (everything
            already fired) but the flag is still echoed in logs.

    BatchItemResult:
      type: object
      required: [id, status]
      properties:
        id:
          type: string
        status:
          type: integer
          description: HTTP status of the sub-request; 0 means "aborted".
        body:
          nullable: true
        error:
          type: string
          nullable: true

    BatchResponse:
      type: object
      required: [results, total_duration_ms]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/BatchItemResult"
        total_duration_ms:
          type: integer

    BroadcastEvent:
      type: object
      required: [type, payload, timestamp, event_id]
      properties:
        type:
          type: string
          example: price.update
        payload:
          type: object
          additionalProperties: true
        component:
          type: integer
          nullable: true
        session_id:
          type: string
          nullable: true
        timestamp:
          type: number
          format: double
        event_id:
          type: string

    HealthResponse:
      type: object
      required: [status, uptime_seconds]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        uptime_seconds:
          type: number
          format: double
        components:
          type: object
          additionalProperties: true

    BridgeEnvelope:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, error]
        data:
          nullable: true
        error:
          type: string
          nullable: true

    DashboardData:
      type: object
      properties:
        address:
          type: string
        balance_eth:
          type: number
          nullable: true
        components:
          type: array
          items:
            type: integer

    SessionCreateRequest:
      type: object
      properties:
        device_id:
          type: string
        app_version:
          type: string

    WalletLinkRequest:
      type: object
      required: [session_id, address]
      properties:
        session_id:
          type: string
        address:
          type: string
          example: "0x0000000000000000000000000000000000000000"
        network:
          type: string
          default: base

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------

paths:

  /health:
    get:
      summary: Liveness/readiness probe
      security: []
      responses:
        "200":
          description: Gateway is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /metrics:
    get:
      summary: JSON metrics snapshot
      responses:
        "200":
          description: Current counters, gauges, and histograms
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /metrics/prom:
    get:
      summary: Prometheus text exposition
      responses:
        "200":
          description: Prometheus-formatted metrics
          content:
            text/plain:
              schema:
                type: string

  /auth/nonce:
    post:
      summary: Get a challenge nonce for SIWE sign-in
      security: []
      responses:
        "200":
          description: Nonce issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  nonce:
                    type: string

  /auth/verify:
    post:
      summary: Verify a SIWE signature and mint a session token
      security: []
      responses:
        "200":
          description: Session token
          content:
            application/json:
              schema:
                type: object

  # -------------------------------------------------------------------
  # Cross-cutting: batch dispatch + live event stream
  # -------------------------------------------------------------------

  /api/v1/batch:
    post:
      summary: Dispatch up to 25 sub-requests in one round trip
      description: |
        Used by the MTRX iOS `MTRXPackager.batchPackage` helper to
        coalesce multi-service calls. Each item is resolved against
        the gateway's in-process route map — no HTTP round trip is
        made for sub-requests.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchRequest"
      responses:
        "200":
          description: Results envelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchResponse"
        "400":
          description: Invalid body or too many items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/events/stream:
    get:
      summary: Server-Sent Events fan-out
      description: |
        Endless `text/event-stream` connection. Clients may filter by
        component ids (`components=3,13`), session id (`session=<id>`),
        or event types (`types=price.update,chat.token`).

        Supports reconnect via the standard `Last-Event-ID` header —
        events newer than the cursor that match the client's filters
        are replayed from the bounded in-memory ring buffer before the
        live stream resumes. A `stream.opened` hello frame is sent on
        every successful connection.

        Returns `429 Too Many Requests` if the per-IP cap is exceeded
        and `503 Service Unavailable` if the global cap is exceeded.
      parameters:
        - in: query
          name: components
          schema:
            type: string
          description: Comma-separated component ids
        - in: query
          name: session
          schema:
            type: string
        - in: query
          name: types
          schema:
            type: string
        - in: header
          name: Last-Event-ID
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Event stream
          content:
            text/event-stream:
              schema:
                type: string
        "429":
          description: Per-IP subscriber cap reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Global subscriber cap reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # -------------------------------------------------------------------
  # Blockchain services (Component 1-30). Each follows the same
  # ServiceEnvelope pattern, so we describe request/response shapes
  # inline and skip repeating the envelope for every route.
  # -------------------------------------------------------------------

  /api/v1/contracts/convert:
    post:
      summary: Component 1 — cross-chain contract conversion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source_code, source_lang]
              properties:
                source_code: {type: string}
                source_lang: {type: string}
                target_chain: {type: string, default: base}
      responses:
        "200":
          description: Converted contract
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceEnvelope"

  /api/v1/contracts/deploy:
    post:
      summary: Component 1 — deploy a converted contract
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source_code, source_lang]
              properties:
                source_code: {type: string}
                source_lang: {type: string}
                target_chain: {type: string, default: base}
      responses:
        "200":
          description: Deployment receipt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceEnvelope"

  /api/v1/defi/loan/create:
    post:
      summary: Component 2 — open a DeFi loan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [borrower, collateral_token, collateral_amount, borrow_token, borrow_amount]
              properties:
                borrower: {type: string}
                collateral_token: {type: string}
                collateral_amount: {type: number}
                borrow_token: {type: string}
                borrow_amount: {type: number}
      responses:
        "200":
          description: Loan created
          content:
            application/json:
              schema: {$ref: "#/components/schemas/ServiceEnvelope"}

  /api/v1/defi/loan/repay:
    post:
      summary: Component 2 — repay a DeFi loan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [loan_id, amount]
              properties:
                loan_id: {type: string}
                amount: {type: number}
      responses:
        "200":
          description: Repayment accepted
          content:
            application/json:
              schema: {$ref: "#/components/schemas/ServiceEnvelope"}

  /api/v1/nft/mint:
    post:
      summary: Component 3 — mint an NFT
      responses:
