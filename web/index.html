<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>0pnMatrx - Chat</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg-surface:#111111;--bg-hover:#1a1a1a;
  --green:#00ff41;--green-dim:#00cc33;--green-dark:#003300;
  --green-glow:0 0 8px rgba(0,255,65,.35);
  --text:#c8c8c8;--text-muted:#666;--border:#1e1e1e;
  --radius:10px;--max-w:820px;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:'SF Mono','Fira Code','Cascadia Code',monospace;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;
}

/* ── Top Bar ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;border-bottom:1px solid var(--border);
  background:var(--bg-surface);flex-shrink:0;z-index:10;
}
.logo{
  font-size:1.15rem;font-weight:700;letter-spacing:2px;
  color:var(--green);text-shadow:var(--green-glow);
  user-select:none;
}
.logo span{color:var(--text-muted);font-weight:400;font-size:.75rem;margin-left:6px;text-shadow:none}
.agent-select{
  background:var(--bg);border:1px solid var(--border);
  color:var(--green);padding:6px 12px;border-radius:6px;
  font-family:inherit;font-size:.8rem;cursor:pointer;
  outline:none;transition:border-color .2s;
}
.agent-select:focus{border-color:var(--green)}
.agent-select option{background:var(--bg);color:var(--text)}

/* ── Chat Area ── */
.chat-area{
  flex:1;overflow-y:auto;padding:20px;
  display:flex;flex-direction:column;gap:14px;
  scroll-behavior:smooth;
}
.chat-area::-webkit-scrollbar{width:6px}
.chat-area::-webkit-scrollbar-track{background:transparent}
.chat-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── Messages ── */
.msg{display:flex;gap:10px;max-width:85%;animation:fadeIn .25s ease}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.agent{align-self:flex-start}

.msg-avatar{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;font-weight:700;border:1px solid var(--border);
  background:var(--bg-surface);color:var(--green);
}
.msg.user .msg-avatar{color:var(--text);border-color:#333}

.msg-body{
  padding:10px 14px;border-radius:var(--radius);
  font-size:.85rem;line-height:1.55;white-space:pre-wrap;
  word-break:break-word;
}
.msg.agent .msg-body{
  background:var(--bg-surface);border:1px solid var(--border);
  border-top-left-radius:2px;
}
.msg.user .msg-body{
  background:linear-gradient(135deg,#0d2b0d,#0a1f0a);
  border:1px solid #1a3a1a;border-top-right-radius:2px;
  color:#d0ffd0;
}

/* code inside messages */
.msg-body code{
  background:rgba(0,255,65,.07);padding:1px 5px;border-radius:3px;
  font-size:.82em;color:var(--green);
}
.msg-body pre{
  background:#080808;border:1px solid var(--border);
  padding:10px 12px;border-radius:6px;margin:8px 0 4px;
  overflow-x:auto;font-size:.8rem;
}
.msg-body pre code{background:none;padding:0;color:var(--text)}

/* ── Tool Calls ── */
.tool-block{
  margin:8px 0;border:1px solid #1a2a1a;border-radius:6px;
  overflow:hidden;
}
.tool-header{
  display:flex;align-items:center;gap:6px;
  padding:6px 10px;background:#0d150d;cursor:pointer;
  font-size:.75rem;color:var(--green-dim);user-select:none;
}
.tool-header::before{content:'\25B6';font-size:.55rem;transition:transform .2s}
.tool-block.open .tool-header::before{transform:rotate(90deg)}
.tool-body{
  display:none;padding:8px 10px;font-size:.78rem;
  background:#060a06;color:var(--text-muted);
  border-top:1px solid #1a2a1a;white-space:pre-wrap;
}
.tool-block.open .tool-body{display:block}

/* ── Typing Indicator ── */
.typing{display:flex;gap:10px;align-self:flex-start;max-width:85%;padding:0 4px}
.typing .msg-avatar{width:32px;height:32px}
.typing-dots{
  display:flex;align-items:center;gap:4px;
  padding:12px 16px;background:var(--bg-surface);
  border:1px solid var(--border);border-radius:var(--radius);
  border-top-left-radius:2px;
}
.typing-dots span{
  width:6px;height:6px;border-radius:50%;background:var(--green-dim);
  animation:bounce .9s infinite;
}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}

/* ── Input Area ── */
.input-area{
  padding:14px 20px 10px;border-top:1px solid var(--border);
  background:var(--bg-surface);flex-shrink:0;
}
.input-row{
  display:flex;gap:10px;align-items:flex-end;
  max-width:var(--max-w);margin:0 auto;
}
.input-wrap{
  flex:1;position:relative;
}
#chat-input{
  width:100%;resize:none;background:var(--bg);
  border:1px solid var(--border);border-radius:var(--radius);
  color:var(--text);padding:12px 14px;font-family:inherit;
  font-size:.85rem;line-height:1.5;max-height:160px;
  outline:none;transition:border-color .2s;
}
#chat-input:focus{border-color:var(--green)}
#chat-input::placeholder{color:var(--text-muted)}

.send-btn{
  width:42px;height:42px;border-radius:50%;border:none;
  background:var(--green);color:var(--bg);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:opacity .2s,transform .1s;
}
.send-btn:hover{opacity:.85}
.send-btn:active{transform:scale(.93)}
.send-btn:disabled{opacity:.3;cursor:default;transform:none}
.send-btn svg{width:18px;height:18px}

/* ── Footer ── */
.footer{
  text-align:center;padding:6px;font-size:.65rem;
  color:var(--text-muted);flex-shrink:0;
  border-top:1px solid #141414;background:var(--bg);
}
.footer a{color:var(--green-dim);text-decoration:none}
.footer a:hover{text-decoration:underline}

/* ── Animations ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

/* ── Responsive ── */
@media(max-width:600px){
  .topbar{padding:10px 14px}
  .logo{font-size:1rem}
  .chat-area{padding:14px 10px;gap:10px}
  .msg{max-width:92%}
  .input-area{padding:10px 12px 8px}
  .msg-body{font-size:.82rem;padding:8px 11px}
}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="logo">0pnMatrx<span>v0.1</span></div>
  <select class="agent-select" id="agent-select">
    <option value="trinity" selected>Trinity</option>
    <option value="neo">Neo</option>
    <option value="morpheus">Morpheus</option>
  </select>
</div>

<!-- Chat Area -->
<div class="chat-area" id="chat-area"></div>

<!-- Input Area -->
<div class="input-area">
  <div class="input-row">
    <div class="input-wrap">
      <textarea id="chat-input" rows="1" placeholder="Ask Trinity anything..." autocomplete="off"></textarea>
    </div>
    <button class="send-btn" id="send-btn" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<!-- Footer -->
<div class="footer">Powered by <a href="https://github.com/ItsDardanRexhepi/0pnMatrx" target="_blank">0pnMatrx</a></div>

<script>
(function(){
  "use strict";

  // ── State ──
  const AGENTS = {
    trinity:  {label:"T", name:"Trinity"},
    neo:      {label:"N", name:"Neo"},
    morpheus: {label:"M", name:"Morpheus"}
  };

  let sessionId = localStorage.getItem("opnmatrx_session") || crypto.randomUUID();
  localStorage.setItem("opnmatrx_session", sessionId);

  let currentAgent = "trinity";
  let isStreaming = false;

  const chatArea   = document.getElementById("chat-area");
  const chatInput  = document.getElementById("chat-input");
  const sendBtn    = document.getElementById("send-btn");
  const agentSel   = document.getElementById("agent-select");

  // ── Helpers ──
  function scrollBottom(){
    requestAnimationFrame(()=>{ chatArea.scrollTop = chatArea.scrollHeight; });
  }

  function agentInfo(){ return AGENTS[currentAgent]; }

  function escapeHtml(s){
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function renderMarkdown(raw){
    // Minimal markdown: code blocks, inline code, bold, italic, links
    let html = escapeHtml(raw);
    // fenced code blocks
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_,lang,code)=>{
      return `<pre><code>${code.trim()}</code></pre>`;
    });
    // inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    // bold
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // italic
    html = html.replace(/(?<!\*)\*([^*]+)\*(?!\*)/g, '<em>$1</em>');
    // links
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--green)">$1</a>');
    return html;
  }

  // ── DOM Builders ──
  function addMessage(role, content, opts={}){
    const msg = document.createElement("div");
    msg.className = `msg ${role}`;

    const avatar = document.createElement("div");
    avatar.className = "msg-avatar";
    if(role === "agent"){
      avatar.textContent = agentInfo().label;
    } else {
      avatar.textContent = "U";
    }

    const body = document.createElement("div");
    body.className = "msg-body";
    if(opts.raw){
      body.innerHTML = content;
    } else {
      body.innerHTML = renderMarkdown(content);
    }

    msg.appendChild(avatar);
    msg.appendChild(body);
    chatArea.appendChild(msg);
    scrollBottom();
    return body;
  }

  function addToolBlock(name, detail){
    const block = document.createElement("div");
    block.className = "tool-block";
    const header = document.createElement("div");
    header.className = "tool-header";
    header.textContent = `Tool: ${name}`;
    header.addEventListener("click", ()=> block.classList.toggle("open"));
    const body = document.createElement("div");
    body.className = "tool-body";
    body.textContent = typeof detail === "string" ? detail : JSON.stringify(detail, null, 2);
    block.appendChild(header);
    block.appendChild(body);
    return block;
  }

  function showTyping(){
    const el = document.createElement("div");
    el.className = "typing";
    el.id = "typing-indicator";
    el.innerHTML = `
      <div class="msg-avatar">${agentInfo().label}</div>
      <div class="typing-dots"><span></span><span></span><span></span></div>`;
    chatArea.appendChild(el);
    scrollBottom();
  }

  function hideTyping(){
    const el = document.getElementById("typing-indicator");
    if(el) el.remove();
  }

  // ── Auto-resize textarea ──
  chatInput.addEventListener("input", ()=>{
    chatInput.style.height = "auto";
    chatInput.style.height = Math.min(chatInput.scrollHeight, 160) + "px";
  });

  // ── Agent selector ──
  agentSel.addEventListener("change", ()=>{
    currentAgent = agentSel.value;
    chatInput.placeholder = `Ask ${agentInfo().name} anything...`;
  });

  // ── Keyboard ──
  chatInput.addEventListener("keydown", (e)=>{
    if(e.key === "Enter" && !e.shiftKey){
      e.preventDefault();
      sendMessage();
    }
  });
  sendBtn.addEventListener("click", sendMessage);

  // ── Gateway URL detection ──
  function baseUrl(){
    // Same origin by default; override with ?api=http://host:port
    const params = new URLSearchParams(location.search);
    return params.get("api") || "";
  }

  // ── Send Message ──
  async function sendMessage(){
    const text = chatInput.value.trim();
    if(!text || isStreaming) return;

    addMessage("user", text);
    chatInput.value = "";
    chatInput.style.height = "auto";
    isStreaming = true;
    sendBtn.disabled = true;
    showTyping();

    const payload = {
      message: text,
      agent: currentAgent,
      session_id: sessionId,
      stream: true
    };

    try {
      const res = await fetch(`${baseUrl()}/chat/stream`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(payload)
      });

      hideTyping();

      if(!res.ok){
        addMessage("agent", `Error: ${res.status} ${res.statusText}`);
        isStreaming = false;
        sendBtn.disabled = false;
        return;
      }

      // SSE streaming
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let agentBody = null;
      let accumulated = "";
      let buffer = "";

      while(true){
        const {done, value} = await reader.read();
        if(done) break;
        buffer += decoder.decode(value, {stream:true});

        const lines = buffer.split("\n");
        buffer = lines.pop(); // keep incomplete line

        for(const line of lines){
          if(!line.startsWith("data:")) continue;
          const dataStr = line.slice(5).trim();
          if(dataStr === "[DONE]") continue;

          let data;
          try { data = JSON.parse(dataStr); } catch{ continue; }

          // Handle different SSE event types
          if(data.type === "tool_call" || data.tool_call){
            const tc = data.tool_call || data;
            const block = addToolBlock(tc.name || tc.tool || "unknown", tc.arguments || tc.input || tc.detail || "");
            if(agentBody){
              agentBody.appendChild(block);
            } else {
              agentBody = addMessage("agent", "", {raw:true});
              agentBody.appendChild(block);
            }
            scrollBottom();
          } else {
            // Token / content delta
            const token = data.content || data.delta || data.text || data.token || "";
            if(token){
              accumulated += token;
              if(!agentBody){
                agentBody = addMessage("agent", "", {raw:true});
              }
              // Re-render the full accumulated text through markdown
              agentBody.innerHTML = renderMarkdown(accumulated);
              scrollBottom();
            }
          }
        }
      }

      // If we never got content, show a fallback
      if(!agentBody && !accumulated){
        addMessage("agent", "No response received.");
      }

    } catch(err){
      hideTyping();
      addMessage("agent", `Connection error: ${err.message}\n\nMake sure the gateway is running:\n\`python -m gateway.server\``);
    }

    isStreaming = false;
    sendBtn.disabled = false;
    chatInput.focus();
  }

  // ── WebSocket (optional live updates) ──
  function connectWs(){
    const wsProto = location.protocol === "https:" ? "wss:" : "ws:";
    const wsUrl = `${wsProto}//${location.host}/ws?session_id=${sessionId}`;
    try {
      const ws = new WebSocket(wsUrl);
      ws.onmessage = (e)=>{
        try {
          const data = JSON.parse(e.data);
          if(data.type === "notification"){
            addMessage("agent", data.content || data.message || JSON.stringify(data));
          }
        } catch{}
      };
      ws.onclose = ()=>{ setTimeout(connectWs, 5000); };
      ws.onerror = ()=>{ ws.close(); };
    } catch{}
  }
  connectWs();

  // ── Welcome message ──
  (function welcome(){
    const welcomeText = `Welcome to **0pnMatrx**.

I'm **Trinity** -- your blockchain operations agent. I can help you with:

- **Smart contract** deployment, conversion, and analysis
- **DeFi** operations: swaps, liquidity, yield farming
- **NFT** minting, marketplace listings, and metadata
- **DAO** creation, governance, and proposal management
- **Token** launches, airdrops, and vesting schedules
- **Cross-chain** bridges, portfolio tracking, and more

Type a question or describe what you want to build. I'll handle the rest.`;
    addMessage("agent", welcomeText);
  })();

  chatInput.focus();
})();
</script>
</body>
</html>
