# Foundry configuration for the 0pnMatrx Solidity contracts.
#
# Usage:
#   forge build
#   forge test
#   forge coverage
#
# Requires forge >= 0.2.0 and solc 0.8.20 (matching the pragma in
# every contract).

[profile.default]
src = "contracts"
test = "contracts/test"
out = "contracts/out"
cache_path = "contracts/cache"
libs = ["contracts/lib"]

# libs is NESTED inside src, so without these skips forge globs ~350 vendored
# .sol files as project sources — OZ's own test/certora trees and the
# account-abstraction v0.6 EntryPoint/samples (which import OZ-v4 paths that
# no longer exist in the vendored OZ v5) — and `forge build`/`forge test`
# fail from clean on lib code the project never compiles. Skip the vendored
# trees; our contracts still import from lib normally (imports are resolved
# via remappings, not this source glob).
skip = [
  "contracts/lib/openzeppelin-contracts/test/**",
  "contracts/lib/openzeppelin-contracts/certora/**",
  "contracts/lib/openzeppelin-contracts/scripts/**",
  "contracts/lib/account-abstraction/contracts/core/**",
  "contracts/lib/account-abstraction/contracts/samples/**",
  "contracts/lib/account-abstraction/contracts/test/**",
  "contracts/lib/forge-std/test/**",
]

# Pin the compiler to the version every .sol file declares, to make
# CI builds reproducible.
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = false
bytecode_hash = "none"
evm_version = "shanghai"

# Verbose-enough gas reports during `forge test` without swamping the
# output.
gas_reports = [
  "OpenMatrixPaymaster",
  "OpenMatrixAttestation",
  "OpenMatrixNFT",
  "OpenMatrixDEX",
  "OpenMatrixStaking",
  "OpenMatrixDAO",
  "OpenMatrixDID",
  "OpenMatrixMarketplace",
  "OpenMatrixInsurance",
]

# Strict warnings — treat anything Solc flags as a hard error in CI.
deny_warnings = false

[profile.ci]
fuzz = { runs = 256 }
verbosity = 2

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"
