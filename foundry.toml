# Foundry configuration for the 0pnMatrx Solidity contracts.
#
# Usage:
#   forge build
#   forge test
#   forge coverage
#
# Requires forge >= 0.2.0 and solc 0.8.20 (matching the pragma in
# every contract).

[profile.default]
src = "contracts"
test = "contracts/test"
out = "contracts/out"
cache_path = "contracts/cache"
libs = ["contracts/lib"]

# Pin the compiler to the version every .sol file declares, to make
# CI builds reproducible.
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = false
bytecode_hash = "none"
evm_version = "shanghai"

# Verbose-enough gas reports during `forge test` without swamping the
# output.
gas_reports = [
  "OpenMatrixPaymaster",
  "OpenMatrixAttestation",
  "OpenMatrixNFT",
  "OpenMatrixDEX",
  "OpenMatrixStaking",
  "OpenMatrixDAO",
  "OpenMatrixDID",
  "OpenMatrixMarketplace",
  "OpenMatrixInsurance",
]

# Strict warnings — treat anything Solc flags as a hard error in CI.
deny_warnings = false

[profile.ci]
fuzz = { runs = 256 }
verbosity = 2

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"
